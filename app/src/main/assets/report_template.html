<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; color: #333; line-height: 1.6; }
        .header, .footer { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #004D40; font-size: 2em; }
        .report-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .report-table th, .report-table td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .report-table th { background-color: #E0E0E0; font-weight: bold; }
        .section-title { font-size: 1.5em; font-weight: bold; margin-top: 30px; border-bottom: 3px solid #004D40; padding-bottom: 10px; }
        .status-pass { color: #2E7D32; font-weight: bold; }
        .status-fail { color: #C62828; font-weight: bold; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .notes { margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>
    <div class="header">
        <h1>MikLink Test Report</h1>
        <p><strong>Overall Status:</strong> <span class="{{OVERALL_STATUS_CLASS}}">{{OVERALL_STATUS}}</span></p>
    </div>

    <div class="section-title">Report Information</div>
    <table class="report-table">
        <tr><th>Client</th><td>{{CLIENT_NAME}}</td><th>Socket ID</th><td>{{SOCKET_ID}}</td></tr>
        <tr><th>Date & Time</th><td>{{TEST_DATE_TIME}}</td><th>Location</th><td>{{LOCATION}}</td></tr>
    </table>

    <div class="section-title">Test Results</div>
    <div id="test-results-body">{{RESULTS_HTML}}</div>

    <div class="section-title">Notes</div>
    <p class="notes">{{NOTES}}</p>

    <div class="footer">
        <p>Generated by MikLink</p>
    </div>
</body>
</html>
